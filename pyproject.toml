[build-system]
requires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "geotaichi"
version = "0.1.0"
description = "A High Performance Multiscale and Multiphysics Simulator"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "GPL-3.0"}
authors = [
    {name = "Shi-Yihao, Guo-Ning"}
]
keywords = ["geomechanics", "simulation", "DEM", "MPM", "taichi"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Physics",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]

dependencies = [
    "taichi>=1.6.0",
    "numpy>=1.20.0",
    "scipy",
    "trimesh",
    "imageio",
    "matplotlib",
    "psutil",
    "pynvml>=11.4.1",
    "shapely>=1.8",
    "meshio",
    "rtree",
    "scikit-image",
    "open3d",
    "pillow",
    "rich",
]

[project.optional-dependencies]
# GPU support (requires CUDA)
gpu = [
    "pynvml>=11.4.1",
]
# Advanced mesh processing
mesh = [
    "gmsh",
]
# Development dependencies
dev = [
    "pytest",
    "pytest-cov",
    "black",
    "flake8",
    "mypy",
]
# All optional dependencies
all = [
    "pynvml>=11.4.1",
    "gmsh",
    "pytest",
    "pytest-cov",
    "black",
    "flake8",
    "mypy",
]

[project.urls]
Homepage = "https://github.com/Yihao-Shi/GeoTaichi"
Repository = "https://github.com/Yihao-Shi/GeoTaichi"
Documentation = "https://github.com/Yihao-Shi/GeoTaichi"
"Bug Tracker" = "https://github.com/Yihao-Shi/GeoTaichi/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["geotaichi*", "third_party*"]
exclude = ["test*", "example*", "docs*"]

# UV-specific configuration
[tool.uv]
dev-dependencies = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "flake8>=6.0.0",
    "mypy>=1.0.0",
]

[tool.uv.sources]
# Use PyPI for all packages
geotaichi = { workspace = true }

# Black configuration
[tool.black]
line-length = 120
target-version = ['py38', 'py39', 'py310', 'py311', 'py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | \.tox
  | build
  | dist
  | third_party
)/
'''
