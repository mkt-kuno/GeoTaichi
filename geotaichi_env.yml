name: geotaichi
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - taichi>=1.7.2,<1.8.0
      - scipy
      - trimesh
      - imageio
      - matplotlib
      - psutil
      - pynvml>=11.4.1
      - shapely>=1.8
      - meshio
      - rtree
      - scikit-image
      - open3d
      - numpy
      - gmsh
