name: geotaichi
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python>=3.8
  - pip
  
  # Core dependencies (installed via conda when possible for better compatibility)
  - numpy>=1.20.0
  - scipy
  - matplotlib
  - pillow
  - imageio
  - psutil
  
  # Scientific computing
  - scikit-image
  
  # Geospatial
  - shapely>=1.8
  
  # Additional conda packages
  - rtree
  
  # Install remaining dependencies via pip
  - pip:
      - taichi>=1.6.0
      - trimesh
      - meshio
      - pynvml>=11.4.1
      - open3d
      - rich
      # Optional: gmsh for advanced mesh processing
      # - gmsh
